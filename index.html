<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Curency Exchanger</title>
    <link rel="stylesheet" href="style.css">
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
      integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    
</head>
<body>
    <div class="navpanel">
        <h1 id="heading" style="color: black;">Currency Converter</h1>
        <!-- <p>Check foreign currency exchange rate</p> -->
    </div>
    <div class="container">
        <p>Enter Amount</p>
        <form id="form">
            <input value="1" type="text">
            <div class="dropdown">
                <div class="from">
                    <h4>From</h4>
                    <div class="select-from">
                        <img src="https://flagsapi.com/US/flat/64.png" alt ="img">
                        <select name="select-from" class="currcode">
                            <!-- <option>usd</option>
                            <option>inr</option> -->
                        </select>
                    </div>
                </div>
                <div class="swap" >
                    <i id="lg" class="fa-solid fa-arrow-right-arrow-left"></i>
                </div>
                
                <div class="to">
                    <h4 >To</h4>
                    <div class="select-To">
                        <img src="https://flagsapi.com/IN/flat/64.png" alt ="img">
                         <select name="select-to" class="currcode">
                            <!-- <option>usd</option> -->
                            <!-- <option>inr</option> --> 
                        </select>
                    </div>
                </div>
            </div>
            <p class="rate hide">1 usd = 83 Inr</p>
            <div class="msg">
                <button class="button">Convert</button>
            </div>
        </form>
    </div>

    


    <script src="concode.js"></script>
    <script src="scripts.js"></script>
</body>
</html>
